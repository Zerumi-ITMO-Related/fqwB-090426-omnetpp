############# TCP Network Benchmark config ###############

**.datarate = 100Tbps

*.car[*].numApps = 1
*.car[*].app[*].typename = "TcpBasicClientApp"
*.car[*].app[*].connectAddress = "server"
*.car[*].app[*].connectPort = 1000
*.car[*].app[*].startTime = uniform(1s, 30s)            # растянутый старт
*.car[*].app[*].requestLength = 100B                    # чуть больше, чем 1B
*.car[*].app[*].replyLength = 5MiB                      # вместо 100MiB
*.car[*].app[*].numRequestsPerSession = 10              # вместо 1000
*.car[*].app[*].thinkTime = uniform(0.1s, 0.5s)         # случайная пауза
*.car[*].app[*].idleInterval = exponential(5s)          # пауза между сессиями

*.server.numApps = 1
*.server.app[0].typename = "TcpGenericServerApp"
*.server.app[0].localPort = 1000


##########################################################
#            Spasi i sohrani parameters                  #
##########################################################

**.tcp.windowScalingSupport = true
**.tcp.advertisedWindow = 655350
**.tcp.mss = 1460


**.ppp[*].queue.typename = "DropTailQueue"
**.ppp[*].queue.packetCapacity = 2000


##########################################################
#              LTE specific parameters                   #
##########################################################

# Number of Resource Blocks
**.numBands = 25

# Transmission Power
**.ueTxPower = 26dBm
**.eNodeBTxPower = 46dBm

# Enable dynamic association of UEs (based on best SINR)
*.car[*].cellularNic.phy.dynamicCellAssociation = true
**.car[*].servingNodeId = 1     # ignored if dynamic association is enabled

# Enable handover
*.car[*].cellularNic.phy.enableHandover = true
*.eNodeB*.cellularNic.phy.enableHandover = true
*.eNodeB*.cellularNic.phy.handoverLatency = 50ms
*.eNodeB*.cellInfo.broadcastMessageInterval = 1s # eNodeB will sends broadcast triggers every second'
**.tolerateMaxDistViolation = true
**.scenario = "RURAL_MACROCELL"
**.nodebHeight = 30m

# X2 and SCTP configuration
*.eNodeB0.numX2Apps = 1
*.eNodeB668.numX2Apps = 1
*.eNodeB*.numX2Apps = 2
*.eNodeB*.x2App[*].server.localPort = 5000 + ancestorIndex(1) # Server ports (x2App[0]=5000, x2App[1]=5001, ...)
**.sctp.nagleEnabled = false         # if true, transmission of small packets will be delayed on the X2
**.sctp.enableHeartbeats = false

**.eNodeB0.macCellId = 1
**.eNodeB0.macNodeId = 1

# eNodeB0 X2Apps
*.eNodeB0.x2App[0].client.connectAddress = "eNodeB1%x2ppp0"
