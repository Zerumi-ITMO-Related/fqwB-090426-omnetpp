[General]
cmdenv-autoflush = true
network = Cars1km

##########################################################
#            Simulation parameters                       #
##########################################################

sim-time-limit = 10 min
#sim-time-limit = 6h

cmdenv-express-mode = true
#cmdenv-interactive=true

debug-on-errors = false
print-undisposed = false
**.server.ppp[*].**.scalar-recording = true
**.server.ppp[*].**.vector-recording = true
**.server.app[*].**.scalar-recording = true
**.server.app[*].**.vector-recording = true
**.car[*].app[*].**.scalar-recording = true
**.car[*].app[*].**.vector-recording = true
**.car[*].**.scalar-recording = true

**.scalar-recording = false
**.vector-recording = false
**.result-recording-modes = default,-histogram

*.playgroundSizeX = 20000km
*.playgroundSizeY = 20000km
*.playgroundSizeZ = 20000km

##########################################################
#            VeinsManager parameters                     #
##########################################################

*.veinsManager.host = "localhost"
*.veinsManager.port = 9999
*.veinsManager.moduleType = "simu5g.nodes.LteCar"
*.veinsManager.moduleName = "car"
*.veinsManager.launchConfig = xmldoc("sumo.launchd.xml")
*.veinsManager.updateInterval = 0.1s
*.veinsManager.autoShutdown = true

# IntegratedCanvasVisualizer (2D)
*.visualizer.*.obstacleLossVisualizer.displayIntersections = true
*.visualizer.*.obstacleLossVisualizer.displayFaceNormalVectors = true
*.visualizer.*.obstacleLossVisualizer.intersectionLineColor = "yellow"
*.visualizer.*.mediumVisualizer.signalPropagationAnimationSpeed = 500/3e8
*.visualizer.*.mediumVisualizer.signalTransmissionAnimationSpeed = 50000/3e8
*.visualizer.*.mediumVisualizer.displaySignals = true
*.visualizer.canvasVisualizer.mediumVisualizer.displaySignalDepartures = false
*.visualizer.canvasVisualizer.mediumVisualizer.displaySignalArrivals = false
*.visualizer.*.physicalLinkVisualizer.displayLinks = true
#*.visualizer.*.mobilityVisualizer.displayPositions = true
#*.visualizer.*.mobilityVisualizer.displayOrientations = true
#*.visualizer.*.mobilityVisualizer.displayVelocities = true
#*.visualizer.*.mobilityVisualizer.displayMovementTrails = true
#*.visualizer.*.mobilityVisualizer.moduleFilter = "**.antenna.mobility"

##########################################################
#                      Mobility                          #
##########################################################

*.car[*].mobility.typename = "VeinsInetMobility"

############### IPv4 configurator config #################
#*.configurator.addStaticRoutes = false
*.configurator.config = xmldoc("./ipconfig.xml")
*.configurator.dumpConfig = "./ipconfig-dump-2.xml"

##########################################################
#                   ARP elimination                      #
##########################################################

**.hasGlobalArp = true
**.ipv4.arp.typename = "GlobalArp"
**.car[*].ipv4.ip.noArp = true

##########################################################
#              Application Configuration                 #
##########################################################

